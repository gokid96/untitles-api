spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false   # 타입 헤더 제거 (Consumer 역직렬화 명시적으로 처리)
    consumer:
      group-id: untitles-group
      auto-offset-reset: earliest              # 처음 구독 시 가장 오래된 메시지부터 처리
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.untitles.*"

  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/untitles?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

  cache:
    type: none  # 로컬에서는 캐시 비활성화 (Redis 없음)

jwt:
  secret: local-dev-secret-key-must-be-at-least-32-characters-long
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

app:
  public-base-url: http://localhost:5173

logging:
  level:
    org.hibernate.SQL: debug
